version: '3.9'

services:
  pomodoro-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pomodoro-timer
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

